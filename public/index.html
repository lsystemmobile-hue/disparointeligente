  <script>
    function toggleSidebar() {
      var sidebar = document.getElementById('sidebar');
      var overlay = document.getElementById('sidebar-overlay');
      sidebar.classList.toggle('sidebar-open');
      overlay.classList.toggle('active');
      document.body.classList.toggle('sidebar-locked');
    }
    // Fecha o menu ao navegar para qualquer página no mobile
    document.addEventListener('click', function(e) {
      if (e.target.closest('.nav-link') && window.innerWidth <= 768) {
        var sidebar = document.getElementById('sidebar');
        if (sidebar.classList.contains('sidebar-open')) toggleSidebar();
      }
    });
  </script>
